name: Publish Container Image (Disabled)

on:
  workflow_dispatch:

# Disabled on purpose:
# - keep this workflow file as reference/history
# - avoid automatic container publishing from this repository
# Re-enable by restoring the tag-based `push` trigger above.

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          ref_name = os.environ["GITHUB_REF_NAME"]
          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          expected = f"v{version}"

          if ref_name != expected:
              raise SystemExit(
                  f"Tag {ref_name!r} does not match pyproject.toml version {version!r}. "
                  f"Expected {expected!r}."
              )
          PY

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

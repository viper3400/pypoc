name: Release Python Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          ref_name = os.environ["GITHUB_REF_NAME"]
          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          expected = f"v{version}"

          if ref_name != expected:
              raise SystemExit(
                  f"Tag {ref_name!r} does not match pyproject.toml version {version!r}. "
                  f"Expected {expected!r}."
              )
          PY

      - name: Build distribution artifacts
        run: uv build

      - name: Verify distribution metadata
        run: uvx twine check dist/*.whl dist/*.tar.gz

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.whl dist/*.tar.gz --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
